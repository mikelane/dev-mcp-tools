[project]
name = "mcp-shared"
version = "0.1.0"
requires-python = ">=3.12"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_shared"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
